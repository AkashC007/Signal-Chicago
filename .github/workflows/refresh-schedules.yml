name: Refresh CTA scheduled headways

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * 1"

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e .
      - name: Check cloud secrets
        id: cloud
        shell: bash
        run: |
          if [[ -n "$SUPABASE_URL" && -n "$SUPABASE_SERVICE_ROLE_KEY" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloud secrets are not configured; skipping the scheduled sync."
          fi
      - if: steps.cloud.outputs.configured == 'true'
        run: cta-pipeline ingest-gtfs
      - if: steps.cloud.outputs.configured == 'true'
        run: cta-pipeline sync-scheduled-headways
